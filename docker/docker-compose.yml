services:
  proof_of_work:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: proof_of_work
    restart: unless-stopped
    environment:
      MCP_PORT: ${MCP_PORT:-5359}
    ports:
      - "${MCP_PORT:-5359}:${MCP_PORT:-5359}"
    volumes:
      - pow_data:/data
    network_mode: bridge

volumes:
  pow_data:
